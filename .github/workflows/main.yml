name: CI/CD - Sistema de Guías de Despacho

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build, Test y Push a Docker Hub
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build y Push imagen Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar tests con Maven
        run: mvn clean verify

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/despacho-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/despacho-service:${{ github.sha }}

  # ──────────────────────────────────────────────
  # JOB 2: Despliegue en EC2 con EFS montado
  # ──────────────────────────────────────────────
  deploy:
    name: Despliegue en EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Desplegar en instancia EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ── Actualizar imagen desde Docker Hub ──
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/despacho-service:latest

            # ── Detener y eliminar contenedor anterior ──
            docker stop despacho-service 2>/dev/null || true
            docker rm   despacho-service 2>/dev/null || true

            # ── Verificar montaje EFS ──
            if ! mountpoint -q /mnt/efs; then
              echo "ADVERTENCIA: EFS no está montado en /mnt/efs"
            fi

            # ── Lanzar nuevo contenedor con EFS montado ──
            docker run -d \
              --name despacho-service \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /mnt/efs:/app/efs \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/despacho-service:latest

            # ── Verificar que el contenedor esté corriendo ──
            sleep 10
            docker ps | grep despacho-service

            # ── Health check ──
            curl -f http://localhost:8080/api/health || echo "Health check falló"

            echo "Despliegue completado exitosamente"
